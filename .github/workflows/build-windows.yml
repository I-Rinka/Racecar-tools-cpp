name: Build Windows
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtmultimedia'

      - name: Download OpenCV
        shell: bash
        run: |
          curl -sL -o opencv.exe "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe"
          ./opencv.exe -o"opencv_extract" -y
          echo "=== OpenCVConfig.cmake locations ==="
          find opencv_extract -name "OpenCVConfig.cmake" 2>/dev/null
          echo "=== Structure ==="
          ls opencv_extract/opencv/build/ 2>/dev/null || ls opencv_extract/ 2>/dev/null

      - name: Configure
        shell: bash
        run: |
          OPENCV_DIR="$(pwd)/opencv_extract/opencv/build"
          echo "OpenCV_DIR=$OPENCV_DIR"
          cmake -B build -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenCV_DIR="$OPENCV_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p package
          cp build/Release/RacecarTools.exe package/

          # Copy OpenCV DLLs
          OPENCV_BIN="$(pwd)/opencv_extract/opencv/build/x64/vc16/bin"
          if [ -d "$OPENCV_BIN" ]; then
            cp "$OPENCV_BIN"/*.dll package/
          fi

          # Run windeployqt to bundle Qt DLLs
          WINDEPLOYQT=$(find "$QT_ROOT_DIR" -name "windeployqt*.exe" 2>/dev/null | head -1)
          if [ -n "$WINDEPLOYQT" ]; then
            "$WINDEPLOYQT" --release --no-translations package/RacecarTools.exe
          fi

          cd package && 7z a ../RacecarTools-Windows.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacecarTools-Windows
          path: RacecarTools-Windows.zip
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RacecarTools-Windows.zip
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
