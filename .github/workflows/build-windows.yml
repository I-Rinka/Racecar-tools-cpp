name: Build Windows
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtmultimedia'

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item build/Release/RacecarTools.exe package/

          # Copy vcpkg DLLs (OpenCV, Tesseract, etc.)
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem "$vcpkgBin/*.dll" | Copy-Item -Destination package/
          }

          # Run windeployqt to bundle Qt DLLs
          $qtBinDir = Split-Path -Parent (Get-Command qmake -ErrorAction SilentlyContinue).Source 2>$null
          if (-not $qtBinDir) {
            $qtBinDir = "$env:QT_ROOT_DIR/bin"
          }
          $windeployqt = Get-ChildItem -Path $qtBinDir -Filter "windeployqt*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($windeployqt) {
            & $windeployqt.FullName --release --no-translations package/RacecarTools.exe
          }

          Compress-Archive -Path package/* -DestinationPath RacecarTools-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacecarTools-Windows
          path: RacecarTools-Windows.zip
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RacecarTools-Windows.zip
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
