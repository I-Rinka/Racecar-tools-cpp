name: Build Windows
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtmultimedia'

      - name: Download OpenCV
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe" -OutFile opencv.exe
          Start-Process -FilePath "$PWD\opencv.exe" -ArgumentList "-o$PWD\opencv_out","-y" -Wait -NoNewWindow

      - name: Configure
        shell: pwsh
        run: |
          $configFile = Get-ChildItem -Recurse opencv_out -Filter "OpenCVConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $configFile) {
            Write-Host "ERROR: Cannot find OpenCVConfig.cmake"
            exit 1
          }
          $opencvDir = $configFile.DirectoryName
          Write-Host "OpenCV_DIR = $opencvDir"
          cmake -B build -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenCV_DIR="$opencvDir"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item build/Release/RacecarTools.exe package/

          Get-ChildItem -Recurse opencv_out -Filter "*.dll" |
            Where-Object { $_.FullName -match "x64" -and $_.Name -notmatch "d\.dll$" } |
            Copy-Item -Destination package/

          $windeployqt = Get-ChildItem -Recurse "$env:QT_ROOT_DIR" -Filter "windeployqt*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($windeployqt) {
            & $windeployqt.FullName --release --no-translations package/RacecarTools.exe
          }

          Compress-Archive -Path package/* -DestinationPath RacecarTools-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacecarTools-Windows
          path: RacecarTools-Windows.zip
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RacecarTools-Windows.zip
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
