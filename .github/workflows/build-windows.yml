name: Build Windows
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtmultimedia'

      - name: Download OpenCV
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe" -OutFile opencv.exe
          Start-Process -FilePath .\opencv.exe -ArgumentList "-o`"$PWD`" -y" -Wait
          # Show structure for debugging
          Get-ChildItem -Recurse opencv/build -Filter "OpenCVConfig.cmake" | ForEach-Object { $_.FullName }

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenCV_DIR="$PWD\opencv\build"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item build/Release/RacecarTools.exe package/

          # Copy OpenCV DLLs
          $opencvBin = "$PWD\opencv\build\x64\vc16\bin"
          if (Test-Path $opencvBin) {
            Get-ChildItem "$opencvBin\*.dll" | Copy-Item -Destination package/
          }
          # Also try bin directly
          $opencvBin2 = "$PWD\opencv\build\bin\Release"
          if (Test-Path $opencvBin2) {
            Get-ChildItem "$opencvBin2\*.dll" | Copy-Item -Destination package/
          }

          # Run windeployqt to bundle Qt DLLs
          $qtBinDir = "$env:QT_ROOT_DIR\bin"
          $windeployqt = Get-ChildItem -Path $qtBinDir -Filter "windeployqt*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($windeployqt) {
            & $windeployqt.FullName --release --no-translations package/RacecarTools.exe
          }

          Compress-Archive -Path package/* -DestinationPath RacecarTools-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacecarTools-Windows
          path: RacecarTools-Windows.zip
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RacecarTools-Windows.zip
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
