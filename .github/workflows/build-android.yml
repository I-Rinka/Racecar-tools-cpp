name: Build Android
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and platform
        run: |
          sdkmanager "ndk;26.1.10909125" "platforms;android-34"
          # Remove all pre-installed platforms with corrupt android.jar
          # (android-35-ext*, android-36-ext*, etc.) — keep only android-34
          find "$ANDROID_HOME/platforms" -maxdepth 1 -type d -name 'android-*' ! -name 'android-34' -exec rm -rf {} +

      - name: Download OpenCV Android SDK
        run: |
          curl -sL -o opencv.zip https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-android-sdk.zip
          unzip -q opencv.zip

      - name: Configure
        run: |
          QT_ANDROID_DIR="${QT_HOST_PATH%/*}/android_arm64_v8a"
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ANDROID_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DANDROID_SDK_ROOT=$ANDROID_HOME \
            -DANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125 \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-34 \
            -DOpenCV_DIR=${{ github.workspace }}/OpenCV-android-sdk/sdk/native/jni

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Build APK
        run: cmake --build build --target apk

      - name: Sign APK
        run: |
          # Generate a debug keystore for signing
          keytool -genkeypair -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,S=Debug,C=US"

          # Find the unsigned APK
          APK=$(find build -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "Found APK: $APK"

          # Align the APK
          ZIPALIGN=$(find "$ANDROID_HOME" -name "zipalign" -type f | head -1)
          if [ -n "$ZIPALIGN" ]; then
            "$ZIPALIGN" -f 4 "$APK" aligned.apk
          else
            cp "$APK" aligned.apk
          fi

          # Sign with apksigner
          APKSIGNER=$(find "$ANDROID_HOME" -name "apksigner" -type f | head -1)
          "$APKSIGNER" sign --ks debug.keystore --ks-pass pass:android \
            --key-pass pass:android --ks-key-alias androiddebugkey \
            --out RacecarTools-Android.apk aligned.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacecarTools-Android
          path: RacecarTools-Android.apk
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RacecarTools-Android.apk
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
