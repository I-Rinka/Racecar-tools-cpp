name: Build Android
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and platform
        run: |
          sdkmanager "ndk;26.1.10909125" "platforms;android-34"
          # Remove all broken android-36 platforms (ext18, ext19, etc.)
          # whose android.jar is corrupt and causes aapt2 to fail
          rm -rf "$ANDROID_HOME"/platforms/android-36*

      - name: Download OpenCV Android SDK
        run: |
          curl -sL -o opencv.zip https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-android-sdk.zip
          unzip -q opencv.zip

      - name: Configure
        run: |
          QT_ANDROID_DIR="${QT_HOST_PATH%/*}/android_arm64_v8a"
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ANDROID_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DANDROID_SDK_ROOT=$ANDROID_HOME \
            -DANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125 \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-34 \
            -DOpenCV_DIR=${{ github.workspace }}/OpenCV-android-sdk/sdk/native/jni

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Build APK
        run: cmake --build build --target apk

      - name: Find APK
        run: |
          APK=$(find build -name "*.apk" -not -path "*/intermediates/*" | head -1)
          cp "$APK" RacecarTools-Android.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacecarTools-Android
          path: RacecarTools-Android.apk
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RacecarTools-Android.apk
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
