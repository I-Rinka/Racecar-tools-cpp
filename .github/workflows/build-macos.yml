name: Build macOS
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt@6 opencv tesseract cmake

      - name: Configure
        run: |
          QT_PREFIX="$(brew --prefix qt@6)"
          export CMAKE_PREFIX_PATH="$QT_PREFIX"
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Bundle dependencies
        run: |
          QT_PREFIX="$(brew --prefix qt@6)"
          BINARY="build/RacecarTools.app/Contents/MacOS/RacecarTools"
          FRAMEWORKS_DIR="build/RacecarTools.app/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS_DIR"

          # Add Qt rpath so macdeployqt can resolve frameworks
          install_name_tool -add_rpath "$QT_PREFIX/lib" "$BINARY" 2>/dev/null || true

          # macdeployqt bundles Qt frameworks (ignore errors about optional Qt modules)
          "$QT_PREFIX/bin/macdeployqt" build/RacecarTools.app -verbose=1 || true

          # Bundle non-Qt dylibs (OpenCV, Tesseract, etc.) recursively
          bundle_lib() {
            local binary="$1"
            local depth="$2"
            if [ "$depth" -gt 5 ]; then return; fi
            for lib in $(otool -L "$binary" | grep -E '/opt/homebrew|/usr/local' | awk '{print $1}'); do
              local base
              base=$(basename "$lib")
              if [ ! -f "$FRAMEWORKS_DIR/$base" ]; then
                cp "$lib" "$FRAMEWORKS_DIR/$base" 2>/dev/null || continue
                chmod 755 "$FRAMEWORKS_DIR/$base"
                install_name_tool -id "@executable_path/../Frameworks/$base" "$FRAMEWORKS_DIR/$base"
                bundle_lib "$FRAMEWORKS_DIR/$base" $((depth + 1))
              fi
              install_name_tool -change "$lib" "@executable_path/../Frameworks/$base" "$binary" 2>/dev/null || true
            done
          }
          bundle_lib "$BINARY" 0

          # Fix cross-references between bundled dylibs
          for f in "$FRAMEWORKS_DIR"/*.dylib; do
            [ -f "$f" ] || continue
            for lib in $(otool -L "$f" | grep -E '/opt/homebrew|/usr/local' | awk '{print $1}'); do
              base=$(basename "$lib")
              install_name_tool -change "$lib" "@executable_path/../Frameworks/$base" "$f" 2>/dev/null || true
            done
          done

          # Re-sign everything (install_name_tool invalidates signatures)
          find build/RacecarTools.app -type f \( -name "*.dylib" -o -name "*.so" \) -exec codesign --force --sign - {} \;
          find build/RacecarTools.app/Contents/Frameworks -type d -name "*.framework" -exec codesign --force --sign - {} \;
          codesign --force --sign - build/RacecarTools.app

      - name: Package
        run: |
          cd build
          zip -r -y RacecarTools-macOS.zip RacecarTools.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacecarTools-macOS
          path: build/RacecarTools-macOS.zip
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/RacecarTools-macOS.zip
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
